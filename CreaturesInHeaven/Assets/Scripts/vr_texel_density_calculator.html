
<style>
  .calc-wrap { padding: 1rem 0; font-size: 15px; }
  .section { margin-bottom: 1.5rem; }
  .label { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 6px; }
  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .row label { font-size: 14px; color: var(--color-text-secondary); min-width: 120px; }
  .row input[type=range] { flex: 1; }
  .row .val { font-size: 14px; font-weight: 500; min-width: 60px; text-align: right; }
  .headset-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; margin-bottom: 1.5rem; }
  .headset-btn { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px 12px; cursor: pointer; text-align: left; font-size: 13px; color: var(--color-text-primary); transition: border-color 0.1s; }
  .headset-btn:hover { border-color: var(--color-border-primary); }
  .headset-btn.active { border: 1.5px solid #378ADD; background: var(--color-background-info); }
  .headset-btn .hname { font-weight: 500; font-size: 13px; margin-bottom: 3px; color: var(--color-text-primary); }
  .headset-btn .hspec { font-size: 11px; color: var(--color-text-secondary); }
  .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
  .metric { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px; }
  .metric .mlabel { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .metric .mval { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
  .metric .munit { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
  .divider { border: none; border-top: 0.5px solid var(--color-border-tertiary); margin: 1.5rem 0; }
  .seg-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .seg-table th { text-align: left; font-weight: 500; font-size: 12px; color: var(--color-text-secondary); padding: 6px 8px; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .seg-table td { padding: 6px 8px; border-bottom: 0.5px solid var(--color-border-tertiary); color: var(--color-text-primary); }
  .seg-table tr:last-child td { border-bottom: none; }
  .custom-toggle { display: flex; gap: 8px; margin-bottom: 1rem; }
  .toggle-btn { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 6px 14px; cursor: pointer; font-size: 13px; color: var(--color-text-secondary); }
  .toggle-btn.active { border-color: #378ADD; color: #378ADD; background: var(--color-background-info); }
  .custom-inputs { display: none; }
  .custom-inputs.show { display: block; }
  .dist-row { display: flex; gap: 8px; align-items: center; }
  .dist-row input[type=number] { width: 100px; padding: 6px 10px; font-size: 14px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); }
  .dist-row select { padding: 6px 10px; font-size: 14px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); }
  .error { font-size: 12px; color: var(--color-text-danger); margin-top: 4px; display: none; }
</style>

<div class="calc-wrap">
  <h2 class="sr-only">VR minimum resolvable detail calculator</h2>

  <div class="section">
    <div class="label">Headset</div>
    <div class="custom-toggle">
      <button class="toggle-btn active" id="presetBtn" onclick="switchMode('preset')">Preset</button>
      <button class="toggle-btn" id="customBtn" onclick="switchMode('custom')">Custom</button>
    </div>

    <div id="presetPanel">
      <div class="headset-grid" id="headsetGrid"></div>
    </div>

    <div class="custom-inputs" id="customPanel">
      <div class="row">
        <label>Horiz. resolution</label>
        <input type="range" id="cResX" min="800" max="4000" step="10" value="1440" oninput="updateCustom()">
        <span class="val" id="cResXVal">1440 px</span>
      </div>
      <div class="row">
        <label>Vert. resolution</label>
        <input type="range" id="cResY" min="600" max="4000" step="10" value="1600" oninput="updateCustom()">
        <span class="val" id="cResYVal">1600 px</span>
      </div>
      <div class="row">
        <label>Horiz. FOV</label>
        <input type="range" id="cFovH" min="60" max="160" step="1" value="108" oninput="updateCustom()">
        <span class="val" id="cFovHVal">108°</span>
      </div>
      <div class="row">
        <label>Vert. FOV</label>
        <input type="range" id="cFovV" min="60" max="130" step="1" value="104" oninput="updateCustom()">
        <span class="val" id="cFovVVal">104°</span>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="label">Viewing distance</div>
    <div class="dist-row">
      <input type="number" id="distVal" value="5" min="0" step="any" oninput="recalc()">
      <select id="distUnit" onchange="recalc()">
        <option value="0.001">mm</option>
        <option value="0.01">cm</option>
        <option value="1" selected>m</option>
        <option value="1000">km</option>
      </select>
    </div>
    <div class="error" id="distError">Enter a positive distance.</div>
  </div>

  <div class="results-grid" id="results"></div>

  <hr class="divider">

  <div class="section">
    <div class="label" style="margin-bottom: 10px;">Cylinder segment guide — minimum segments for common radii</div>
    <table class="seg-table">
      <thead><tr>
        <th>Radius</th>
        <th>Min segments</th>
      </tr></thead>
      <tbody id="segBody"></tbody>
    </table>
  </div>
</div>

<script>
const HEADSETS = [
  { name: "Valve Index", resX: 1440, resY: 1600, fovH: 108, fovV: 104 },
  { name: "Quest Pro", resX: 1800, resY: 1920, fovH: 106, fovV: 95.57 },
  { name: "Beyond 2E", resX: 2560, resY: 2560, fovH: 110, fovV: 97 },
  { name: "Steam Frame", resX: 2160, resY: 2160, fovH: 110, fovV: 110 },
];

let mode = 'preset';
let activeHeadset = 0;
let customHS = { resX: 1440, resY: 1600, fovH: 108, fovV: 104 };

function switchMode(m) {
  mode = m;
  document.getElementById('presetBtn').className = 'toggle-btn' + (m === 'preset' ? ' active' : '');
  document.getElementById('customBtn').className = 'toggle-btn' + (m === 'custom' ? ' active' : '');
  document.getElementById('presetPanel').style.display = m === 'preset' ? '' : 'none';
  document.getElementById('customPanel').className = 'custom-inputs' + (m === 'custom' ? ' show' : '');
  recalc();
}

function getHS() {
  return mode === 'preset' ? HEADSETS[activeHeadset] : customHS;
}

function getDistM() {
  const v = parseFloat(document.getElementById('distVal').value);
  const u = parseFloat(document.getElementById('distUnit').value);
  return v * u;
}

function ppd(resPx, fovDeg) { return resPx / fovDeg; }

function minDetailM(distM, ppd_val) {
  return 2 * distM * Math.tan((1 / ppd_val) * Math.PI / 360);
}

function recalc() {
  const rawVal = parseFloat(document.getElementById('distVal').value);
  const errEl = document.getElementById('distError');
  if (isNaN(rawVal) || rawVal <= 0) {
    errEl.style.display = 'block';
    document.getElementById('results').innerHTML = '';
    document.getElementById('segBody').innerHTML = '';
    return;
  }
  errEl.style.display = 'none';

  const hs = getHS();
  const dist = getDistM();

  const ppdH = ppd(hs.resX, hs.fovH);
  const ppdV = ppd(hs.resY, hs.fovV);
  const detailH = minDetailM(dist, ppdH);
  const detailV = minDetailM(dist, ppdV);
  const detailWorst = Math.max(detailH, detailV);
  const detailMM = detailWorst * 1000;

  const texelDensity = 1 / detailWorst;

  function fmtDetail(m) {
    if (m < 0.001) return (m * 1000).toFixed(3) + ' mm';
    if (m < 0.01) return (m * 1000).toFixed(2) + ' mm';
    if (m < 1) return (m * 100).toFixed(2) + ' cm';
    return m.toFixed(2) + ' m';
  }

  function fmtDensity(ppm) {
    if (ppm >= 1) return ppm.toFixed(0) + ' px/m';
    return (ppm * 100).toFixed(2) + ' px/cm';
  }

  document.getElementById('results').innerHTML = `
    <div class="metric"><div class="mlabel">Pixels per degree (H)</div><div class="mval">${ppdH.toFixed(1)}</div><div class="munit">px/°</div></div>
    <div class="metric"><div class="mlabel">Pixels per degree (V)</div><div class="mval">${ppdV.toFixed(1)}</div><div class="munit">px/°</div></div>
    <div class="metric"><div class="mlabel">Min resolvable detail</div><div class="mval">${fmtDetail(detailWorst)}</div><div class="munit">at this distance</div></div>
    <div class="metric"><div class="mlabel">Max useful texel density</div><div class="mval">${fmtDensity(texelDensity)}</div><div class="munit">texture resolution ceiling</div></div>
  `;

  const radii = [0.01, 0.02, 0.05, 0.1, 0.15, 0.2, 0.3, 0.5, 1.0];
  document.getElementById('segBody').innerHTML = radii.map(r => {
    const circumference = 2 * Math.PI * r;
    const segs = Math.ceil(circumference / detailWorst);
    const label = r < 1 ? (r * 100).toFixed(0) + ' cm' : r.toFixed(1) + ' m';
    return `<tr><td>${label}</td><td>${segs}</td></tr>`;
  }).join('');
}

function updateCustom() {
  customHS.resX = parseInt(document.getElementById('cResX').value);
  customHS.resY = parseInt(document.getElementById('cResY').value);
  customHS.fovH = parseFloat(document.getElementById('cFovH').value);
  customHS.fovV = parseFloat(document.getElementById('cFovV').value);
  document.getElementById('cResXVal').textContent = customHS.resX + ' px';
  document.getElementById('cResYVal').textContent = customHS.resY + ' px';
  document.getElementById('cFovHVal').textContent = customHS.fovH + '°';
  document.getElementById('cFovVVal').textContent = customHS.fovV + '°';
  recalc();
}

const grid = document.getElementById('headsetGrid');
HEADSETS.forEach((h, i) => {
  const btn = document.createElement('button');
  btn.className = 'headset-btn' + (i === 0 ? ' active' : '');
  btn.innerHTML = `<div class="hname">${h.name}</div><div class="hspec">${h.resX}×${h.resY} · ${h.fovH}°H</div>`;
  btn.onclick = () => {
    activeHeadset = i;
    document.querySelectorAll('.headset-btn').forEach((b, j) => b.className = 'headset-btn' + (j === i ? ' active' : ''));
    recalc();
  };
  grid.appendChild(btn);
});

recalc();
</script>
